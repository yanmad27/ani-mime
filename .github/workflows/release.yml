name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping create"
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Ani-Mime $GITHUB_REF_NAME" \
              --notes "$(gh api repos/${{ github.repository }}/releases/generate-notes \
                -f tag_name="$GITHUB_REF_NAME" \
                --jq .body)"
          fi

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ani-Mime ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Re-sign with entitlements (ad-hoc builds)
        if: ${{ !env.APPLE_SIGNING_IDENTITY }}
        run: bash src-tauri/script/post-build-sign.sh ${{ matrix.target }}

      - name: Upload re-signed DMG
        if: ${{ !env.APPLE_SIGNING_IDENTITY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ matrix.target }}" == *"aarch64"* ]]; then
            ARCH="aarch64"
          else
            ARCH="x64"
          fi
          DMG="src-tauri/target/${{ matrix.target }}/release/bundle/dmg/ani-mime_${VERSION}_${ARCH}.dmg"
          if [ -f "$DMG" ]; then
            gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber
          fi
